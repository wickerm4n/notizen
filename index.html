<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; object-src 'none'; base-uri 'none'; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; form-action 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Eine moderne, lokale Notizen-App für GitHub Pages.">
  <meta name="theme-color" content="#2f5f9e">
  <title>Notizen</title>
  <link rel="icon" href="icons/favicon.svg?v=2026.06.16.8" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/app-icon.svg?v=2026.06.16.8">
  <link rel="manifest" href="assets/site.webmanifest?v=2026.06.16.8">
  <link rel="stylesheet" href="css/styles.css?v=2026.06.16.8">
</head>
<body>
  <svg class="svg-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="icon-search" viewBox="0 0 24 24"><path d="m21 21-4.35-4.35"/><circle cx="11" cy="11" r="7"/></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15"/><path d="M10 11v6M14 11v6"/></symbol>
    <symbol id="icon-copy" viewBox="0 0 24 24"><path d="M8 8h11v11H8z"/><path d="M5 16H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v1"/></symbol>
    <symbol id="icon-pin" viewBox="0 0 24 24"><path d="m15 4 5 5-4 1-4 8-2-2-4 4 4-4-2-2 8-4z"/></symbol>
    <symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></symbol>
    <symbol id="icon-upload" viewBox="0 0 24 24"><path d="M12 21V9"/><path d="m7 14 5-5 5 5"/><path d="M5 3h14"/></symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/><path d="M3 12h2M19 12h2M12 3v2M12 19v2M5.6 5.6 7 7M17 17l1.4 1.4M18.4 5.6 17 7M7 17l-1.4 1.4"/></symbol>
    <symbol id="icon-eye" viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></symbol>
    <symbol id="icon-split" viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M12 5v14"/></symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M4 20h4L19 9l-4-4L4 16z"/><path d="m14 6 4 4"/></symbol>
    <symbol id="icon-fullscreen" viewBox="0 0 24 24"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M21 16v5h-5"/><path d="M3 3l6 6M21 3l-6 6M3 21l6-6M21 21l-6-6"/></symbol>
    <symbol id="icon-menu" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></symbol>
    <symbol id="icon-save" viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5z"/><path d="M8 3v7h8V3M8 21v-7h8v7"/></symbol>
    <symbol id="icon-close" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></symbol>
  </svg>

  <div class="app-shell" id="app">
    <aside class="sidebar" id="sidebar" aria-label="Notiznavigation">
      <div class="brand">
        <img src="icons/app-icon.svg?v=2026.06.16.8" width="42" height="42" alt="">
        <div>
          <strong>Notizen</strong>
          <span>Lokal und privat</span>
        </div>
        <button class="icon-button mobile-only sidebar-close-button" id="closeSidebarButton" type="button" aria-label="Notizliste schließen" data-tooltip="Notizliste schließen">
          <svg class="icon"><use href="#icon-close"></use></svg>
        </button>
      </div>

      <button class="button button-primary new-note-button" id="newNoteButton" type="button" data-tooltip="Neue Notiz erstellen">
        <svg class="icon"><use href="#icon-plus"></use></svg>
        Neue Notiz
      </button>

      <label class="search-field" for="searchInput">
        <svg class="icon"><use href="#icon-search"></use></svg>
        <input id="searchInput" type="search" placeholder="Notizen durchsuchen" autocomplete="off">
      </label>

      <label class="field-label" for="sortSelect">Sortierung</label>
      <select id="sortSelect" class="select">
        <option value="updatedAt">Zuletzt bearbeitet</option>
        <option value="createdAt">Erstellungsdatum</option>
        <option value="title">Titel alphabetisch</option>
      </select>

      <div class="sidebar-meta" id="noteCount">0 Notizen</div>
      <div class="selection-bar" id="selectionBar" hidden>
        <span id="selectionCount">0 ausgewählt</span>
        <div class="selection-actions" aria-label="Aktionen für ausgewählte Notizen">
          <button class="icon-button" id="bulkExportButton" type="button" aria-label="Auswahl exportieren" data-tooltip="Auswahl exportieren">
            <svg class="icon"><use href="#icon-download"></use></svg>
          </button>
          <button class="icon-button" id="bulkDuplicateButton" type="button" aria-label="Auswahl duplizieren" data-tooltip="Auswahl duplizieren">
            <svg class="icon"><use href="#icon-copy"></use></svg>
          </button>
          <button class="icon-button danger" id="bulkDeleteButton" type="button" aria-label="Auswahl löschen" data-tooltip="Auswahl löschen">
            <svg class="icon"><use href="#icon-trash"></use></svg>
          </button>
          <button class="icon-button" id="clearSelectionButton" type="button" aria-label="Auswahl aufheben" data-tooltip="Auswahl aufheben">
            <svg class="icon"><use href="#icon-close"></use></svg>
          </button>
        </div>
      </div>
      <div class="note-list" id="noteList" role="list" aria-label="Alle Notizen"></div>

      <div class="sidebar-actions">
        <button class="button button-ghost" id="importButton" type="button" data-tooltip="Notizen importieren">
          <svg class="icon"><use href="#icon-upload"></use></svg>
          Importieren
        </button>
        <button class="button button-ghost" id="exportAllButton" type="button" data-tooltip="Alle Notizen exportieren">
          <svg class="icon"><use href="#icon-download"></use></svg>
          Alle exportieren
        </button>
      </div>
    </aside>

    <button class="scrim" id="sidebarScrim" type="button" aria-label="Navigation schließen"></button>

    <main class="workspace" id="workspace">
      <header class="toolbar">
        <button class="icon-button mobile-only" id="openSidebarButton" type="button" aria-label="Notizliste öffnen" data-tooltip="Notizliste öffnen">
          <svg class="icon"><use href="#icon-menu"></use></svg>
        </button>

        <input class="title-input" id="noteTitleInput" type="text" placeholder="Titel der Notiz" aria-label="Titel der Notiz">

        <div class="toolbar-actions" aria-label="Notizaktionen">
          <button class="icon-button" id="saveNowButton" type="button" aria-label="Jetzt speichern" data-tooltip="Jetzt speichern">
            <svg class="icon"><use href="#icon-save"></use></svg>
          </button>
          <button class="icon-button" id="renameNoteButton" type="button" aria-label="Notiz umbenennen" data-tooltip="Notiz umbenennen">
            <svg class="icon"><use href="#icon-edit"></use></svg>
          </button>
          <button class="icon-button" id="pinNoteButton" type="button" aria-label="Notiz anpinnen" data-tooltip="Notiz anpinnen">
            <svg class="icon"><use href="#icon-pin"></use></svg>
          </button>
          <button class="icon-button" id="duplicateNoteButton" type="button" aria-label="Notiz duplizieren" data-tooltip="Notiz duplizieren">
            <svg class="icon"><use href="#icon-copy"></use></svg>
          </button>
          <button class="icon-button" id="exportNoteButton" type="button" aria-label="Notiz exportieren" data-tooltip="Notiz exportieren">
            <svg class="icon"><use href="#icon-download"></use></svg>
          </button>
          <button class="icon-button danger" id="deleteNoteButton" type="button" aria-label="Notiz löschen" data-tooltip="Notiz löschen">
            <svg class="icon"><use href="#icon-trash"></use></svg>
          </button>
        </div>
      </header>

      <section class="viewbar" aria-label="Editoransicht">
        <div class="segmented-control">
          <button class="segment" data-view-mode="editor" type="button" data-tooltip="Editor anzeigen">
            <svg class="icon"><use href="#icon-edit"></use></svg>
            Editor
          </button>
          <button class="segment" data-view-mode="preview" type="button" data-tooltip="Markdown-Vorschau anzeigen">
            <svg class="icon"><use href="#icon-eye"></use></svg>
            Vorschau
          </button>
          <button class="segment" data-view-mode="split" type="button" data-tooltip="Editor und Vorschau teilen">
            <svg class="icon"><use href="#icon-split"></use></svg>
            Split
          </button>
        </div>

        <div class="viewbar-actions">
          <button class="icon-button mobile-only fullscreen-sidebar-toggle" id="fullscreenSidebarButton" type="button" aria-label="Notizliste &ouml;ffnen" data-tooltip="Notizliste &ouml;ffnen">
            <svg class="icon"><use href="#icon-menu"></use></svg>
          </button>
          <button class="icon-button" id="fullscreenButton" type="button" aria-label="Vollbild-Schreibmodus" data-tooltip="Vollbild-Schreibmodus">
            <svg class="icon"><use href="#icon-fullscreen"></use></svg>
          </button>
          <button class="icon-button" id="settingsButton" type="button" aria-label="Einstellungen" data-tooltip="Einstellungen">
            <svg class="icon"><use href="#icon-settings"></use></svg>
          </button>
        </div>
      </section>

      <section class="editor-wrap" aria-label="Notizeditor">
        <div class="editor-grid" id="editorGrid">
          <label class="editor-pane" for="noteEditor">
            <span class="visually-hidden">Inhalt der Notiz</span>
            <textarea id="noteEditor" spellcheck="true" placeholder="Notiz schreiben…"></textarea>
          </label>
          <article class="preview-pane markdown-body" id="markdownPreview" aria-label="Markdown-Vorschau"></article>
        </div>

        <div class="empty-state" id="emptyState" hidden>
          <h1>Keine Notiz ausgewählt</h1>
          <p>Erstelle eine neue Notiz oder wähle links einen Eintrag aus.</p>
          <button class="button button-primary" id="emptyNewNoteButton" type="button" data-tooltip="Neue Notiz erstellen">
            <svg class="icon"><use href="#icon-plus"></use></svg>
            Neue Notiz
          </button>
        </div>
      </section>

      <footer class="statusbar" id="statusbar">
        <span id="saveStatus">Gespeichert</span>
        <span id="updatedAtStatus">Noch nicht bearbeitet</span>
        <span id="wordCount">0 Wörter</span>
        <span id="charCount">0 Zeichen</span>
      </footer>
    </main>
  </div>

  <dialog class="modal" id="settingsDialog">
    <form method="dialog" id="settingsForm" class="modal-card">
      <div class="modal-header">
        <h2>Einstellungen</h2>
        <button class="icon-button" value="cancel" type="submit" aria-label="Schließen" data-tooltip="Schließen">
          <svg class="icon"><use href="#icon-close"></use></svg>
        </button>
      </div>

      <div class="settings-grid">
        <label>
          <span>Schriftart</span>
          <select name="fontFamily" class="select">
            <option value="system">Systemschrift</option>
            <option value="serif">Serif</option>
            <option value="mono">Monospace</option>
            <option value="atkinson">Atkinson-ähnlich</option>
          </select>
        </label>

        <label>
          <span>Schriftgröße</span>
          <input name="fontSize" type="range" min="14" max="28" step="1">
          <output id="fontSizeOutput">18 px</output>
        </label>

        <label>
          <span>Theme</span>
          <select name="theme" class="select">
            <option value="system">System</option>
            <option value="light">Hell</option>
            <option value="dark">Dunkel</option>
          </select>
        </label>

        <label>
          <span>Editor-Ansicht</span>
          <select name="viewMode" class="select">
            <option value="editor">Editor</option>
            <option value="preview">Markdown-Vorschau</option>
            <option value="split">Split-View</option>
          </select>
        </label>

        <label class="check-row">
          <input name="autoSave" type="checkbox">
          <span>Automatisch speichern</span>
        </label>

        <label class="check-row">
          <input name="showCounters" type="checkbox">
          <span>Wort- und Zeichenzähler anzeigen</span>
        </label>
      </div>

      <menu class="modal-actions">
        <button class="button button-ghost" value="cancel" type="submit" data-tooltip="Änderungen verwerfen">Abbrechen</button>
        <button class="button button-primary" id="saveSettingsButton" value="default" type="submit" data-tooltip="Einstellungen übernehmen">Übernehmen</button>
      </menu>
    </form>
  </dialog>

  <dialog class="modal" id="confirmDialog">
    <form method="dialog" class="modal-card compact">
      <div class="modal-header">
        <h2 id="confirmTitle">Bestätigen</h2>
      </div>
      <p id="confirmMessage">Möchtest du fortfahren?</p>
      <menu class="modal-actions">
        <button class="button button-ghost" value="cancel" type="submit" data-tooltip="Aktion abbrechen">Abbrechen</button>
        <button class="button button-danger" id="confirmAcceptButton" value="confirm" type="submit" data-tooltip="Endgültig löschen">Löschen</button>
      </menu>
    </form>
  </dialog>

  <dialog class="modal" id="renameDialog">
    <form method="dialog" class="modal-card compact" id="renameForm">
      <div class="modal-header">
        <h2>Notiz umbenennen</h2>
      </div>
      <label>
        <span>Neuer Titel</span>
        <input class="text-field" id="renameInput" type="text" maxlength="120" required>
      </label>
      <menu class="modal-actions">
        <button class="button button-ghost" value="cancel" type="submit" data-tooltip="Umbenennen abbrechen">Abbrechen</button>
        <button class="button button-primary" value="confirm" type="submit" data-tooltip="Neuen Titel speichern">Speichern</button>
      </menu>
    </form>
  </dialog>

  <dialog class="modal" id="exportDialog">
    <form method="dialog" class="modal-card compact" id="exportForm">
      <div class="modal-header">
        <h2 id="exportTitle">Exportieren</h2>
      </div>
      <label>
        <span>Format</span>
        <select id="exportFormat" class="select">
          <option value="txt">Textdatei (.txt)</option>
          <option value="md">Markdown (.md)</option>
          <option value="json">JSON (.json)</option>
        </select>
      </label>
      <menu class="modal-actions">
        <button class="button button-ghost" value="cancel" type="submit" data-tooltip="Export abbrechen">Abbrechen</button>
        <button class="button button-primary" value="confirm" type="submit" data-tooltip="Datei herunterladen">Exportieren</button>
      </menu>
    </form>
  </dialog>

  <input id="importInput" type="file" accept=".json,.txt,.md,.markdown,.text,.log,.csv,.yaml,.yml,.xml,.html,.css,.js,.ts,.ini,.conf,.toml,.sql,application/json,text/*" multiple hidden>
  <nav class="context-menu" id="noteContextMenu" aria-label="Notiz-Kontextmenü" hidden>
    <button type="button" data-context-action="open">
      <svg class="icon"><use href="#icon-edit"></use></svg>
      Öffnen
    </button>
    <button type="button" data-context-action="rename">
      <svg class="icon"><use href="#icon-edit"></use></svg>
      Umbenennen
    </button>
    <button type="button" data-context-action="pin">
      <svg class="icon"><use href="#icon-pin"></use></svg>
      <span data-pin-label>Notiz anpinnen</span>
    </button>
    <button type="button" data-context-action="duplicate">
      <svg class="icon"><use href="#icon-copy"></use></svg>
      Duplizieren
    </button>
    <button type="button" data-context-action="export">
      <svg class="icon"><use href="#icon-download"></use></svg>
      Exportieren
    </button>
    <span class="context-menu-divider" aria-hidden="true"></span>
    <button class="danger" type="button" data-context-action="delete">
      <svg class="icon"><use href="#icon-trash"></use></svg>
      Löschen
    </button>
  </nav>
  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

  <script src="js/storage.js?v=2026.06.16.8" defer></script>
  <script src="js/notes.js?v=2026.06.16.8" defer></script>
  <script src="js/markdown.js?v=2026.06.16.8" defer></script>
  <script src="js/settings.js?v=2026.06.16.8" defer></script>
  <script src="js/editor.js?v=2026.06.16.8" defer></script>
  <script src="js/ui.js?v=2026.06.16.8" defer></script>
  <script src="js/app.js?v=2026.06.16.8" defer></script>
  <script src="js/update.js?v=2026.06.16.8" data-app-version="2026.06.16.8" defer></script>
</body>
</html>
